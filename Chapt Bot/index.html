<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Chat</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg:#0a0a0f; --surface2:#1a1a24; --border:#2a2a3a; --accent:#7c6dfa; --accent2:#fa6d9e; --text:#e8e8f0; --text-dim:#7a7a95; --user-bubble:#1e1e30; --ai-bubble:#13131d; }
    body { font-family:'DM Mono',monospace; background:var(--bg); color:var(--text); height:100vh; display:flex; flex-direction:column; overflow:hidden; }
    body::before { content:''; position:fixed; inset:0; background:radial-gradient(ellipse 60% 40% at 20% 20%,rgba(124,109,250,0.07) 0%,transparent 60%),radial-gradient(ellipse 50% 50% at 80% 80%,rgba(250,109,158,0.05) 0%,transparent 60%); pointer-events:none; z-index:0; }
    .app { position:relative; z-index:1; display:flex; flex-direction:column; height:100vh; max-width:820px; margin:0 auto; width:100%; }
    header { padding:20px 24px 16px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:12px; background:rgba(10,10,15,0.8); backdrop-filter:blur(12px); }
    .logo { width:36px; height:36px; background:linear-gradient(135deg,var(--accent),var(--accent2)); border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:18px; animation:pulse 3s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{box-shadow:0 0 20px rgba(124,109,250,0.4)} 50%{box-shadow:0 0 35px rgba(124,109,250,0.7)} }
    .header-text h1 { font-family:'Syne',sans-serif; font-weight:800; font-size:18px; background:linear-gradient(90deg,var(--accent),var(--accent2)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
    .header-text p { font-size:11px; color:var(--text-dim); margin-top:1px; }
    .status { margin-left:auto; display:flex; align-items:center; gap:6px; font-size:11px; color:var(--text-dim); }
    .status-dot { width:7px; height:7px; border-radius:50%; background:#4ade80; animation:blink 2s ease-in-out infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
    .messages { flex:1; overflow-y:auto; padding:24px 20px; display:flex; flex-direction:column; gap:16px; scroll-behavior:smooth; }
    .messages::-webkit-scrollbar{width:4px} .messages::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
    .message { display:flex; gap:10px; animation:slideUp 0.3s ease forwards; opacity:0; transform:translateY(10px); }
    @keyframes slideUp { to{opacity:1;transform:translateY(0)} }
    .message.user { flex-direction:row-reverse; }
    .avatar { width:32px; height:32px; border-radius:9px; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:14px; }
    .message.user .avatar{background:linear-gradient(135deg,#fa6d9e,#f97316)}
    .message.ai .avatar{background:linear-gradient(135deg,var(--accent),#a78bfa)}
    .bubble { max-width:72%; padding:12px 16px; border-radius:14px; font-size:14px; line-height:1.65; }
    .message.user .bubble{background:var(--user-bubble);border:1px solid rgba(250,109,158,0.15);border-top-right-radius:4px}
    .message.ai .bubble{background:var(--ai-bubble);border:1px solid rgba(124,109,250,0.15);border-top-left-radius:4px}
    .bubble .meta{font-size:10px;color:var(--text-dim);margin-bottom:5px;font-family:'Syne',sans-serif;font-weight:600;letter-spacing:0.05em;text-transform:uppercase}
    .message.user .bubble .meta{text-align:right;color:rgba(250,109,158,0.6)}
    .message.ai .bubble .meta{color:rgba(124,109,250,0.6)}
    .typing-indicator{display:flex;gap:5px;align-items:center;padding:6px 0}
    .typing-indicator span{width:7px;height:7px;border-radius:50%;background:var(--accent);opacity:0.4;animation:typingDot 1.2s ease-in-out infinite}
    .typing-indicator span:nth-child(2){animation-delay:0.2s} .typing-indicator span:nth-child(3){animation-delay:0.4s}
    @keyframes typingDot{0%,60%,100%{opacity:0.2;transform:translateY(0)}30%{opacity:1;transform:translateY(-4px)}}
    .welcome{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;text-align:center;padding:40px 24px;animation:fadeIn 0.6s ease forwards}
    @keyframes fadeIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
    .welcome-icon{width:64px;height:64px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:20px;display:flex;align-items:center;justify-content:center;font-size:28px;box-shadow:0 0 40px rgba(124,109,250,0.3)}
    .welcome h2{font-family:'Syne',sans-serif;font-weight:800;font-size:26px;background:linear-gradient(90deg,var(--text),var(--text-dim));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
    .welcome p{color:var(--text-dim);font-size:13px;max-width:320px;line-height:1.7}
    .suggestions{display:grid;grid-template-columns:1fr 1fr;gap:8px;width:100%;max-width:440px;margin-top:8px}
    .suggestion{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 14px;font-size:12px;color:var(--text-dim);cursor:pointer;text-align:left;transition:all 0.2s;line-height:1.5;font-family:'DM Mono',monospace}
    .suggestion:hover{border-color:var(--accent);color:var(--text);background:rgba(124,109,250,0.08)}
    .input-area{padding:16px 20px 20px;background:rgba(10,10,15,0.9);backdrop-filter:blur(12px);border-top:1px solid var(--border)}
    .input-box{display:flex;align-items:flex-end;gap:10px;background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:10px 12px;transition:border-color 0.2s,box-shadow 0.2s}
    .input-box:focus-within{border-color:var(--accent);box-shadow:0 0 0 3px rgba(124,109,250,0.12)}
    textarea{flex:1;background:none;border:none;outline:none;color:var(--text);font-family:'DM Mono',monospace;font-size:13.5px;line-height:1.6;resize:none;min-height:22px;max-height:140px;overflow-y:auto}
    textarea::placeholder{color:var(--text-dim)}
    .send-btn{width:36px;height:36px;background:linear-gradient(135deg,var(--accent),#a78bfa);border:none;border-radius:9px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.2s;font-size:16px;color:white}
    .send-btn:hover{transform:scale(1.08);box-shadow:0 0 16px rgba(124,109,250,0.5)}
    .send-btn:active{transform:scale(0.96)}
    .send-btn:disabled{opacity:0.4;cursor:not-allowed;transform:none}
    .hint{margin-top:8px;text-align:center;font-size:10.5px;color:var(--text-dim);opacity:0.6}
  </style>
</head>
<body>
<div class="app">
  <header>
    <div class="logo">✦</div>
    <div class="header-text"><h1>AI Chat</h1><p>Powered by Claude</p></div>
    <div class="status"><div class="status-dot"></div>Online</div>
  </header>

  <div class="messages" id="messages">
    <div class="welcome" id="welcome">
      <div class="welcome-icon">✦</div>
      <h2>Hello! How can I help?</h2>
      <p>Ask me anything — questions, ideas, writing, code, and more.</p>
      <div class="suggestions">
        <button class="suggestion" onclick="useSuggestion(this)">Explain quantum computing simply</button>
        <button class="suggestion" onclick="useSuggestion(this)">Write a short poem about rain</button>
        <button class="suggestion" onclick="useSuggestion(this)">Help me debug my JavaScript code</button>
        <button class="suggestion" onclick="useSuggestion(this)">What are 5 healthy breakfast ideas?</button>
      </div>
    </div>
  </div>

  <div class="input-area">
    <div class="input-box">
      <textarea id="input" placeholder="Message AI..." rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()">➤</button>
    </div>
    <p class="hint">Press Enter to send · Shift+Enter for new line</p>
  </div>
</div>

<script>
  const messagesEl = document.getElementById('messages');
  const inputEl = document.getElementById('input');
  const sendBtn = document.getElementById('sendBtn');
  let conversationHistory = [];
  let isLoading = false;

  function autoResize(el) { el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,140)+'px'; }
  function handleKey(e) { if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();} }
  function useSuggestion(btn) { inputEl.value=btn.textContent; autoResize(inputEl); inputEl.focus(); sendMessage(); }
  function getTime() { return new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}); }
  function scrollToBottom() { messagesEl.scrollTop=messagesEl.scrollHeight; }
  function escapeHtml(t) { return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>'); }

  function addMessage(role, text) {
    document.getElementById('welcome')?.remove();
    const msg = document.createElement('div');
    msg.className = 'message ' + role;
    msg.innerHTML = '<div class="avatar">'+(role==='user'?'👤':'✦')+'</div><div class="bubble"><div class="meta">'+(role==='user'?'You':'AI')+' · '+getTime()+'</div><div class="content">'+escapeHtml(text)+'</div></div>';
    messagesEl.appendChild(msg);
    scrollToBottom();
  }

  function addTypingIndicator() {
    document.getElementById('welcome')?.remove();
    const msg = document.createElement('div');
    msg.className='message ai'; msg.id='typing';
    msg.innerHTML='<div class="avatar">✦</div><div class="bubble"><div class="meta">AI · thinking</div><div class="typing-indicator"><span></span><span></span><span></span></div></div>';
    messagesEl.appendChild(msg);
    scrollToBottom();
  }

  function removeTypingIndicator() { document.getElementById('typing')?.remove(); }

  async function sendMessage() {
    const text = inputEl.value.trim();
    if(!text||isLoading) return;
    isLoading=true; sendBtn.disabled=true;
    inputEl.value=''; inputEl.style.height='auto';
    addMessage('user', text);
    conversationHistory.push({role:'user',content:text});
    addTypingIndicator();
    try {
      const res = await fetch('/chat', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,messages:conversationHistory})
      });
      const data = await res.json();
      removeTypingIndicator();
      if(data.content&&data.content[0]) {
        const reply = data.content[0].text;
        conversationHistory.push({role:'assistant',content:reply});
        addMessage('ai', reply);
      } else { addMessage('ai','No response. Try again.'); }
    } catch(err) {
      removeTypingIndicator();
      addMessage('ai',' Server nahi chal raha! Terminal mein "node server.js" likho.');
    }
    isLoading=false; sendBtn.disabled=false; inputEl.focus();
  }
</script>
</body>
</html>
